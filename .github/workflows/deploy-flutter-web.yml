name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main, claude/soccer-ai-app-ideas-4ZSuh ]
    paths:
      - 'epl_match_simulator/**'
      - '.github/workflows/deploy-flutter-web.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Enable Web
        run: flutter config --enable-web

      - name: Get dependencies
        working-directory: epl_match_simulator
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: epl_match_simulator
        run: flutter build web --release --web-renderer html --base-href=/Internal/

      - name: List build output
        run: ls -la epl_match_simulator/build/web || echo "Directory does not exist"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./epl_match_simulator/build/web
          cname: false
