name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - claude/soccer-ai-app-ideas-4ZSuh
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Flutter Web assets exist
        run: |
          if [ ! -d "epl_match_simulator/build/web" ]; then
            echo "ERROR: Flutter Web assets not found!"
            exit 1
          fi
          echo "✓ Flutter Web assets found"
          ls -la epl_match_simulator/build/web/ | head -20

      - name: Deploy to gh-pages
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Copy assets to temporary location
          mkdir -p /tmp/web-assets
          cp -r epl_match_simulator/build/web/* /tmp/web-assets/

          # Create and switch to gh-pages branch
          git checkout --orphan gh-pages

          # Remove all files from working directory
          git rm -rf .

          # Copy assets back
          cp -r /tmp/web-assets/* .

          # Create .nojekyll to skip Jekyll processing
          touch .nojekyll

          # Add and commit
          git add .
          git commit -m "Deploy Flutter Web to GitHub Pages [$(date)]"

          # Force push to gh-pages
          git push -f origin gh-pages

      - name: Deployment Summary
        run: |
          echo "✓ Deployment to gh-pages completed successfully"
          echo "GitHub Pages URL will be available at:"
          echo "https://columbus0370.github.io/Internal/"
