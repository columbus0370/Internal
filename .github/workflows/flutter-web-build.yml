name: Flutter Web Build & Auto-commit

on:
  push:
    branches:
      - claude/vercel-dynamic-build
    paths:
      - 'epl_match_simulator/**'
      - 'pubspec.yaml'
      - '.github/workflows/flutter-web-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd epl_match_simulator
          flutter pub get

      - name: Build Web
        run: |
          cd epl_match_simulator
          flutter build web --release

      - name: Verify build output
        run: |
          if [ ! -d "epl_match_simulator/build/web" ]; then
            echo "ERROR: build/web directory not created"
            exit 1
          fi
          echo "✓ Build successful"
          ls -lh epl_match_simulator/build/web/ | head -20

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push build artifacts
        run: |
          cd epl_match_simulator

          # Check if there are changes
          if git diff --quiet build/web/; then
            echo "No changes in build/web, skipping commit"
            exit 0
          fi

          cd ..
          git add -f epl_match_simulator/build/web/
          git commit -m "Auto-generated: Flutter Web build artifacts

Generated by GitHub Actions workflow
Branch: ${{ github.ref }}
Commit: ${{ github.sha }}"
          git push origin claude/vercel-dynamic-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Success Summary
        run: |
          echo "=========================================="
          echo "✓ Flutter Web Build Complete"
          echo "=========================================="
          echo ""
          echo "Build Output:"
          echo "  Location: epl_match_simulator/build/web/"
          echo "  Files: $(find epl_match_simulator/build/web -type f | wc -l)"
          echo "  Size: $(du -sh epl_match_simulator/build/web | cut -f1)"
          echo ""
          echo "Status: Ready for Vercel deployment"
